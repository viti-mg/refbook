version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=production
      - PORT=3000
    depends_on:
      - postgres
    networks:
      - refbook-network

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=refbook
      - POSTGRES_PASSWORD=refbook_password
      - POSTGRES_DB=refbook
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - refbook-network

volumes:
  postgres-data:

networks:
  refbook-network:
    driver: bridge
